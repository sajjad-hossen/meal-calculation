name: .NET Core Build Test

on:
  push:
    branches: [ "main", "master" ] # আপনার মেইন ব্রাঞ্চের নাম অনুযায়ী চেঞ্জ করতে পারেন
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x # আপনার প্রজেক্টের .NET ভার্সন (যেমন: 7.0.x বা 8.0.x)

    - name: Restore Dependencies
      run: dotnet restore

    - name: Build Project
      run: dotnet build --no-restore --configuration Release